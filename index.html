<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FR Demo</title>
    <link rel="stylesheet" href="./css/styles.css">
    <!-- Human -->
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/human/dist/human.js" crossorigin="anonymous"></script>
</head>
<body>
    <main class="fr" id="frContainer">
        <div class="engine__selector">
            <label for="engineSelect">Выберите модель распознавания:</label>
            <select id="engineSelect">
                <option value="mediapipe">MediaPipe (Google)</option>
                <option value="human">Human</option>
            </select>
            <button id="applyEngineBtn" class="apply__button">Применить</button>
        </div>
        <div class="center-content">
            <h2 class="fr__title">Подтвердить возраст</h2>
            <div class="camera-container" id="cameraContainer"></div>
        </div>
    </main>
<script type="module" src="./js/app.js"></script>
</body>
</html>
